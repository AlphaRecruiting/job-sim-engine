version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobsim
      POSTGRES_USER: jobsim
      POSTGRES_PASSWORD: jobsim
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://jobsim:jobsim@postgres:5432/jobsim
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret
      APP_URL: http://localhost:3000
      API_URL: http://localhost:4000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REALTIME_MODEL: gpt-4o-realtime-preview
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://jobsim:jobsim@postgres:5432/jobsim
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REALTIME_MODEL: gpt-4o-realtime-preview
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api

volumes:
  postgres_data:
